name: release

on:
  create:
    tags:
      - v*

env:
  APP_IMAGE_NAME: sergei3333/my-app-devops

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      # - uses: actions/checkout@v2
      # - uses: docker/setup-qemu-action@v1
      # - uses: docker/setup-buildx-action@v1

      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - run: docker pull sergei3333/my-app-devops-caddy:latest
      - run: docker tag sergei3333/my-app-devops-caddy:latest sergei3333/my-app-devops-caddy:${{ github.ref_name }}
      - run: docker push sergei3333/my-app-devops-caddy:${{ github.ref_name }}