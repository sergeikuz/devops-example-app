name: release

on:
  create:
    tags:
      - v*

env:
  APP_IMAGE_NAME: sergei3333/my-app-devops

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - run: docker pull ${{ env.APP_IMAGE_NAME }}:latest

      - run: docker tag ${{ env.APP_IMAGE_NAME }}:latest ${{ env.APP_IMAGE_NAME }}:${{ github.ref_name }}

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - run: docker push ${{ env.APP_IMAGE_NAME }}:${{ github.ref_name }}

      - run: docker pull sergei3333/my-app-devops-caddy:latest
      - run: docker tag sergei3333/my-app-devops-caddy:latest sergei3333/my-app-devops-caddy:${{ github.ref_name }}
      - run: docker push sergei3333/my-app-devops-caddy:${{ github.ref_name }}
